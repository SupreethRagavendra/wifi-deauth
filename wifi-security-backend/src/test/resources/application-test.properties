# ============================================
# Test Configuration for WiFi Deauth Detection
# ============================================

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Layer 1 Detection Configuration
detection.layer1.timeout-ms=5
detection.layer1.attack-threshold=50
detection.layer1.suspicious-threshold=30
detection.layer1.warning-threshold=15

# Performance Tuning for Tests
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Disable unnecessary features for faster tests
spring.jpa.open-in-view=false
spring.main.banner-mode=off

# Logging (reduce verbosity for tests)
logging.level.root=WARN
logging.level.com.wifi.security=INFO
logging.level.org.springframework=WARN
