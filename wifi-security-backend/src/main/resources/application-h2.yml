# ===================================
# H2 In-Memory Database Profile
# Use when cloud MySQL is unreachable
# Run with: SPRING_PROFILE=h2 make run-backend
# ===================================

spring:
  datasource:
    url: jdbc:h2:mem:wifideauth;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    
  sql:
    init:
      mode: never  # Skip schema.sql since we use create-drop

logging:
  level:
    com.wifi.security: INFO
    org.hibernate.SQL: OFF
