# ===================================
# WiFi Security Backend Configuration
# ===================================

# Server Configuration
server.port=8080
spring.application.name=wifi-security-backend

# ===================================
# Database Configuration (Aiven MySQL Cloud)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/wifi_deauth?useSSL=true&requireSSL=true&sslMode=REQUIRED&serverTimezone=UTC&characterEncoding=UTF-8&collation=utf8mb4_unicode_ci&connectTimeout=60000&socketTimeout=60000
spring.datasource.username=${DB_USERNAME:db-user}
spring.datasource.password=${DB_PASSWORD:db-pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Optimization for Performance Testing
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Initialize database schema
spring.sql.init.mode=always

# ===================================
# JWT Configuration
# ===================================
# IMPORTANT: Change this in production! Use a strong 256-bit key
jwt.secret=${JWT_SECRET:WiFiSecurityPlatformSuperSecretKey2026ThatIsAtLeast256BitsLongForHS256Algorithm}
jwt.expiration=86400000

# ===================================
# CORS Configuration
# ===================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ===================================
# Logging Configuration
# ===================================
logging.level.root=INFO
logging.level.com.wifi.security=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===================================
# Security
# ===================================
# BCrypt strength (cost factor)
security.bcrypt.strength=12

# ===================================
# Detection Configuration
# ===================================
detection.monitor.interface=wlan1
detection.layer1.warning-threshold=15
detection.layer1.suspicious-threshold=30
detection.layer1.attack-threshold=50

# ===================================
# Email (SMTP via Bravo/Sendinblue)
# ===================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=your-smtp-username
spring.mail.password=your-smtp-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
